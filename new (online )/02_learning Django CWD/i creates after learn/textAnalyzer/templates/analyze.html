<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Django Website — Result</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #0d0f14;
      --bg-card:     #13161e;
      --bg-input:    #1a1e28;
      --bg-hover:    #1f2434;
      --border:      #2a2f42;
      --green:       #44b378;
      --green-light: #6fcf97;
      --text:        #e8eaf0;
      --muted:       #6b7280;
      --dim:         #3f4556;
      --r:           12px;
      --rs:          8px;
      --tr:          0.2s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(68,179,120,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(68,179,120,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Navbar ── */
    nav {
      position: sticky; top: 0; z-index: 99;
      background: rgba(13,15,20,.93);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo {
      width: 32px; height: 32px;
      background: var(--green); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fira Code', monospace; font-size: 13px; font-weight: 600; color: #0d0f14;
    }
    .brand-name { font-size: 16px; font-weight: 700; color: var(--text); }
    .badge {
      font-family: 'Fira Code', monospace; font-size: 10px;
      padding: 3px 10px;
      background: rgba(68,179,120,.1); color: var(--green);
      border: 1px solid rgba(68,179,120,.25); border-radius: 20px;
    }

    /* ── Main ── */
    main {
      position: relative; z-index: 1;
      padding: 28px 18px 56px;
      max-width: 460px; margin: 0 auto;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .a1 { animation: fadeUp .4s ease .05s both; }
    .a2 { animation: fadeUp .4s ease .15s both; }
    .a3 { animation: fadeUp .4s ease .25s both; }
    .a4 { animation: fadeUp .4s ease .35s both; }
    .a5 { animation: fadeUp .4s ease .45s both; }

    /* ── Back Link ── */
    .back {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; color: var(--green);
      text-decoration: none;
      padding: 8px 14px;
      background: rgba(68,179,120,.08);
      border: 1px solid rgba(68,179,120,.2);
      border-radius: 20px;
      margin-bottom: 24px;
      transition: background var(--tr);
    }
    .back:hover { background: rgba(68,179,120,.15); }
    .back svg { width: 14px; height: 14px; }

    /* ── Page Header ── */
    .pg-head { text-align: center; margin-bottom: 24px; }
    .tag {
      display: inline-block;
      font-family: 'Fira Code', monospace; font-size: 11px;
      color: var(--green); background: rgba(68,179,120,.1);
      border: 1px solid rgba(68,179,120,.2);
      border-radius: 20px; padding: 4px 12px;
      margin-bottom: 12px; letter-spacing: .5px;
    }
    .pg-head h1 { font-size: 26px; font-weight: 700; letter-spacing: -.8px; margin-bottom: 8px; }
    .pg-head h1 span { color: var(--green); }
    .pg-head p { font-size: 14px; color: var(--muted); line-height: 1.6; }

    /* ── Success Banner ── */
    .success {
      display: flex; align-items: center; gap: 12px;
      background: rgba(68,179,120,.1);
      border: 1px solid rgba(68,179,120,.3);
      border-radius: 10px; padding: 14px 18px;
      margin-bottom: 18px;
    }
    .success-icon {
      width: 36px; height: 36px;
      background: var(--green); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0; color: #0d0f14; font-weight: 700;
    }
    .success-title { font-size: 14px; font-weight: 700; color: var(--green); }
    .success-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Result Card ── */
    .result-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden; margin-bottom: 14px;
      position: relative;
    }
    .result-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--green), transparent);
    }
    .rc-head {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.015);
    }
    .rc-head .rlabel {
      font-family: 'Fira Code', monospace;
      font-size: 11px; text-transform: uppercase;
      letter-spacing: .7px; color: var(--dim); font-weight: 600;
    }
    .rc-body { padding: 18px; }
    .r-title {
      font-size: 22px; font-weight: 700;
      letter-spacing: -.5px; color: var(--text); line-height: 1.3;
    }
    .r-text { font-size: 15px; color: var(--muted); line-height: 1.7; }

    /* ── Checkbox Result Items ── */
    .cb-results { display: flex; flex-direction: column; gap: 10px; }

    .cb-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; border-radius: var(--rs);
      border: 1px solid; transition: all var(--tr);
    }
    .cb-row.on  { background: rgba(68,179,120,.08); border-color: rgba(68,179,120,.3); }
    .cb-row.off { background: rgba(255,255,255,.02); border-color: var(--border); opacity: .6; }

    .st-icon {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .on  .st-icon { background: var(--green); color: #0d0f14; }
    .off .st-icon { background: var(--bg-input); color: var(--dim); }

    .cb-row-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .cb-row-status {
      font-size: 11px; font-family: 'Fira Code', monospace; margin-top: 2px;
    }
    .on  .cb-row-status { color: var(--green); }
    .off .cb-row-status { color: var(--dim); }

    /* ── Summary Bar ── */
    .summary {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      padding: 14px 18px; margin-top: 14px;
    }
    .summary-count {
      font-family: 'Fira Code', monospace;
      font-size: 26px; font-weight: 600; color: var(--green);
    }
    .summary-label { font-size: 13px; font-weight: 600; color: var(--muted); text-align: right; }

    /* ── Empty State ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty .e-icon { font-size: 42px; margin-bottom: 12px; }
    .empty h2 { font-size: 18px; margin-bottom: 8px; }
    .empty p  { font-size: 14px; }

    footer {
      text-align: center; padding: 20px;
      font-size: 12px; color: var(--dim);
      font-family: 'Fira Code', monospace;
      position: relative; z-index: 1;
    }
  </style>
</head>
<body>

  <nav>
    <a class="brand" href="#">
      <div class="logo">Dj</div>
      <span class="brand-name">DjangoSite</span>
    </a>
    <span class="badge">{{output}}</span>
  </nav>

  <main>

 

    <header class="pg-head a2">
      <div class="tag">{{output}}</div>
      <h1><span>{{text}}</span></h1>
      
      
      
      <p>Here's a summary of what you submitted.</p>

    </header>

    <div id="content"></div>

  </main>

  <footer>built with Django &amp; ❤️ · dark mode</footer>

    const o2 = p.get('o2') === '1';
    const o3 = p.get('o3') === '1';
    const total = [o1, o2, o3].filter(Boolean).length;

        <!-- Success Banner -->
        <div class="success a3">

          </div>

        <div class="result-card a4">

                </div>
              </div>

              <div class="cb-row ${o2 ? 'on' : 'off'}">

                </div>
              </div>

              <div class="cb-row ${o3 ? 'on' : 'off'}">
                <div class="st-icon">${o3 ? '✓' : '✕'}</div>
                <div>
                  <div class="cb-row-name">🧪 Beta Access</div>
                  <div class="cb-row-status">${o3 ? 'ENABLED' : 'NOT SELECTED'}</div>
                </div>
              </div>

            </div>

            <div class="summary">
              <div>
                <div class="summary-count">${total}/3</div>
                <div style="font-size:11px;color:var(--dim);font-family:'Fira Code',monospace">options active</div>
              </div>
              <div class="summary-label">
                ${total === 0 ? 'None selected' : total === 3 ? 'All selected 🎉' : 'Partially selected'}
              </div>
            </div>
          </div>
        </div>`;
    }
  </script>
</body>
</html>
