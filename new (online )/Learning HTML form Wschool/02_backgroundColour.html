<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background and text colours with css</title>
    <style>
        body {
            background-color: rgb(13, 2, 61);
            color: rgb(145, 145, 154);
        }
        h1 {
            color: rgb(180, 2, 239);
            /* for background color */
            background-color: aqua;
            /* border */
            border:2px solid; 
            /* padding add the space bt text and border */
            padding: 10px;
            /* margin adds space around the element */
            margin: 26px;

            border-color: rgb(246, 29, 0);
        }
    </style>
</head>
<body>
    <h1>Hi i am Heading</h1>
